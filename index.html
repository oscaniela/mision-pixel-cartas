<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misión Pixel - Cartas Digitales</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #7dd3fc, #fef3c7);
      margin: 0;
      padding: 20px;
      text-align: center;
      color: #1f2937;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 20px;
      font-weight: normal;
      margin-top: 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-width: 420px;
      margin: 25px auto;
    }

    button {
      font-size: 18px;
      padding: 14px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .desafio { background: #fde047; }
    .bonus { background: #67e8f9; }
    .trampa { background: #fca5a5; }
    .duelo { background: #c4b5fd; }
    .ayuda { background: #f9a8d4; }
    .power { background: #86efac; }
    .jefe { background: #fdba74; }

    .card {
      max-width: 420px;
      margin: 25px auto;
      background: white;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
      border: 5px solid #1f2937;
    }

    .icon {
      font-size: 48px;
    }

    .card h3 {
      font-size: 26px;
      margin: 10px 0;
    }

    .card p {
      font-size: 20px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>🎮 Misión Pixel</h1>
  <h2>Cartas Digitales</h2>

  <div class="buttons">
    <button class="desafio" onclick="sacarCarta('desafio')">❓ Sacar Desafío</button>
    <button class="bonus" onclick="sacarCarta('bonus')">⭐ Sacar Bonus</button>
    <button class="trampa" onclick="sacarCarta('trampa')">⚠️ Sacar Trampa</button>
    <button class="duelo" onclick="sacarCarta('duelo')">⚔️ Sacar Duelo</button>
    <button class="ayuda" onclick="sacarCarta('ayuda')">❤️ Sacar Ayuda</button>
    <button class="power" onclick="sacarCarta('power')">🛡️ Sacar Power-Up</button>
    <button class="jefe" onclick="sacarCarta('jefe')">👾 Sacar Jefe Final</button>
  </div>

  <div id="resultado" class="card">
    <div class="icon">🎲</div>
    <h3>Elige un tipo de carta</h3>
    <p>Presiona un botón para sacar una carta aleatoria.</p>
  </div>

  <div class="footer">
    Juego cooperativo familiar desde 4 años.
  </div>

  <script>
    const cartas = {
      desafio: [
        ["❓", "Robot Pixel", "Imita a un Alien y ganan 1 moneda."],
        ["❓", "Sonido Secreto", "Haz un sonido de videojuego. Si alguien lo reconoce, avancen 1 casilla."],
        ["❓", "Animal Misterioso", "Imita un animal sin hablar. Si el equipo adivina, ganan 1 moneda."],
        ["❓", "Héroe Inventado", "Inventa el nombre de un héroe pixelado. Si todos lo aprueban, ganan 1 estrella."],
        ["❓", "Dibujo Invisible", "Dibuja una figura en el aire. Si alguien adivina, avancen 1 casilla."],
        ["❓", "Adivinanza Estrella", "Brillo en el cielo y también en los juegos. ¿Qué soy? Respuesta: estrella."],
        ["❓", "Objeto Secreto", "Da una pista sobre un objeto de la casa. Si alguien adivina, ganan 1 moneda."],
        ["❓", "Salto de Plataforma", "Actúa como si saltaras un obstáculo. Si lo haces, el equipo avanza 1 casilla."]
      ],

      bonus: [
        ["⭐", "Súper Salto", "Avanza 3 casillas."],
        ["⭐", "Moneda Dorada", "El equipo gana 2 monedas."],
        ["⭐", "Estrella Brillante", "Todos los jugadores avanzan 1 casilla."],
        ["⭐", "Dado Mágico", "Lanza el dado otra vez."],
        ["⭐", "Portal Secreto", "Avanza hasta la siguiente casilla de portal."],
        ["⭐", "Turbo Pixel", "El jugador que va más atrás avanza 3 casillas."]
      ],

      trampa: [
        ["⚠️", "Nube Traviesa", "Retrocede 2 casillas."],
        ["⚠️", "Bloque Roto", "El equipo pierde 1 moneda."],
        ["⚠️", "Camino Resbaloso", "En tu próximo turno, avanza solo 1 casilla."],
        ["⚠️", "Enemigo Escondido", "Lanza el dado. Si sale 1, 2 o 3, el equipo pierde 1 vida."]
      ],

      duelo: [
        ["⚔️", "Monstruo Verde", "Lanza el dado. Si sale 4, 5 o 6, ganan 1 moneda."],
        ["⚔️", "Robot Guardián", "Lanza el dado. Si sale 5 o 6, avanza 2 casillas."],
        ["⚔️", "Sombra Pixelada", "Lanza el dado. Si sale 1 o 2, retrocede 1 casilla. Si sale 3 a 6, ganas 1 moneda."],
        ["⚔️", "Mini Jefe", "Lanza el dado. Si sale 6, el equipo recupera 1 vida. Si no, no pasa nada."]
      ],

      ayuda: [
        ["❤️", "Todos Juntos", "El jugador que va más atrás avanza 3 casillas."],
        ["❤️", "Corazón Extra", "El equipo recupera 1 vida."],
        ["❤️", "Mano Amiga", "Elige a otro jugador. Ambos avanzan 2 casillas."],
        ["❤️", "Equipo Unido", "El equipo gana 1 moneda por cada jugador."]
      ],

      power: [
        ["🛡️", "Botas Veloces", "Guarda esta carta. En tu próximo turno, avanza +2 casillas."],
        ["🛡️", "Escudo Protector", "Guarda esta carta. Sirve para evitar una trampa."],
        ["🛡️", "Llave Pixelada", "Guarda esta carta. Sirve para abrir el portal más cercano y avanzar hasta él."]
      ],

      jefe: [
        ["👾", "Jefe Final Pixel", "Para ganar, superen 2 de 3 retos: una adivinanza, una imitación creativa y sacar 4, 5 o 6 en el dado."]
      ]
    };

    function sacarCarta(tipo) {
      const lista = cartas[tipo];
      const carta = lista[Math.floor(Math.random() * lista.length)];

      document.getElementById("resultado").innerHTML = `
        <div class="icon">${carta[0]}</div>
        <h3>${carta[1]}</h3>
        <p>${carta[2]}</p>
      `;
    }
  </script>

</body>
</html>
